# Example profile for PccSecurityCheckLovableStack.
#
# Setup — one file per customer / project:
#   cp config/supabase-example.properties config/supabase-<profile>.properties
#   # e.g. supabase-fernau.properties, supabase-acme.properties — then fill in real values
#
# Select the active profile at runtime:
#   env:  ACTIVE_PROFILE=fernau mvn -q compile exec:java
#   jvm:  mvn -q compile exec:java -Dactive.profile=fernau
#
# All `supabase-*.properties` are gitignored except this example file.
# Override the resolved path entirely with:
#   -Dsupabase.config.file=/abs/path.properties   (or env SUPABASE_CONFIG_FILE)

# ---------------------------------------------------------------------------
# Required: Supabase project URL and Anon-Key
# ---------------------------------------------------------------------------

# Format: https://<project-ref>.supabase.co
supabase.url=https://YOUR-PROJECT-REF.supabase.co

# Anonymous (anon) public API key. Safe to ship in frontends.
supabase.anon.key=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.REPLACE_ME.REPLACE_ME

# ---------------------------------------------------------------------------
# Secrets — NEVER read from this file. Provide at runtime instead:
#
#   Service-Role-Key (required):
#     env:  SUPABASE_SERVICE_ROLE_KEY=eyJh...
#     jvm:  -Dsupabase.service.role.key=eyJh...
#
#   DB password (optional — required only for rls-status and permissive-policies):
#     env:  SUPABASE_DB_PASSWORD=...
#     jvm:  -Dsupabase.db.password=...
# ---------------------------------------------------------------------------

# ---------------------------------------------------------------------------
# Optional: frontend URL (for service-role-leak check + security headers)
# ---------------------------------------------------------------------------
frontend.url=https://your-app.lovable.app

# ---------------------------------------------------------------------------
# Optional: local source paths (enable file-based checks)
# ---------------------------------------------------------------------------
# Path to your Supabase edge-functions directory (typically supabase/functions).
# Without this, edge-fn-audit will be SKIPPED.
# functions.path=/Users/timo/some-project/supabase/functions

# Path to your Supabase SQL migrations directory (typically supabase/migrations).
# Without this, plpgsql-secdef-audit will be SKIPPED.
# migrations.path=/Users/timo/some-project/supabase/migrations

# ---------------------------------------------------------------------------
# Optional: Postgres direct access for catalog-based checks.
#
# Used by: rls-status, permissive-policies.
# All read-only — no schema modifications, nothing is left behind on the target.
# db.password is NEVER read from this file (see secrets section above).
# ---------------------------------------------------------------------------
# Defaults: host=db.<projectref>.supabase.co, port=5432, name=postgres, user=postgres.
# Override only if your project uses a connection pooler or non-default user.
# db.host=
# db.port=5432
# db.name=postgres
# db.user=postgres

# ---------------------------------------------------------------------------
# Optional: Allowlist für absichtlich-public Resources
#
# Tabellen und Buckets, die bewusst öffentlich lesbar sein sollen (z. B. CMS-
# Inhalte, Logos, Avatare). Treffer landen im Report als ACCEPTED (blau —
# "Ausnahme") statt als YELLOW-Warnung. So bleibt die Ausnahme dokumentiert,
# ohne das Status-Summary künstlich rot/gelb zu färben.
#
# Komma-separierte Listen, case-insensitive. Tabellennamen optional mit Schema-
# Präfix (z. B. 'public.posts').
# ---------------------------------------------------------------------------
# allowlist.tables=posts,categories,public_articles
# allowlist.buckets=avatars,public-logos

# ---------------------------------------------------------------------------
# Optional: misc
# ---------------------------------------------------------------------------
# supabase.project.ref=
# http.connect.timeout.seconds=10
# http.request.timeout.seconds=20
